<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly - Interactive Dictionary</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1><i class="fas fa-book-open"></i> Wordly</h1>
            <p class="tagline">Your Interactive Language Companion</p>
            <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <form id="search-form" class="search-form">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="word-input" 
                        placeholder="Enter a word (e.g., serendipity)" 
                        aria-label="Search for a word"
                        autocomplete="off"
                        required
                    >
                    <button type="submit" class="search-btn" aria-label="Search">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
                <span id="error-message" class="error-message hidden" role="alert"></span>
            </form>
        </section>

        <!-- Loading State -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Searching...</p>
        </div>

        <!-- Results Section -->
        <section id="results-section" class="results-section hidden">
            <div class="word-header">
                <h2 id="word-title"></h2>
                <div class="word-actions">
                    <button id="audio-btn" class="icon-btn" aria-label="Play pronunciation" title="Listen">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button id="favorite-btn" class="icon-btn" aria-label="Add to favorites" title="Save word">
                        <i class="far fa-star"></i>
                    </button>
                </div>
            </div>
            
            <div id="phonetic-text" class="phonetic"></div>
            
            <div id="meanings-container" class="meanings-container">
                <!-- Meanings will be dynamically inserted here -->
            </div>
            
            <div class="source-section">
                <small>Source: <a id="source-link" href="#" target="_blank" rel="noopener">Free Dictionary API</a></small>
            </div>
        </section>

        <!-- Favorites Section -->
        <section class="favorites-section" id="favorites-section">
            <h3><i class="fas fa-star"></i> Saved Words</h3>
            <div id="favorites-list" class="favorites-list">
                <p class="empty-state">No saved words yet. Start searching and save your favorites!</p>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 Wordly Dictionary. Built with the Free Dictionary API.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
